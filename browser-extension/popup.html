<!DOCTYPE html>
<html>
<head>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 320px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #1a1a2e;
      color: #e0e0e0;
      padding: 16px;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 16px;
    }
    .logo {
      width: 32px;
      height: 32px;
      background: #FF0000;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .logo svg { width: 18px; height: 18px; }
    h1 { font-size: 16px; font-weight: 600; color: #fff; }
    .subtitle { font-size: 11px; color: #888; }
    .status-card {
      background: #16213e;
      border-radius: 10px;
      padding: 12px;
      margin-bottom: 12px;
    }
    .status-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 12px;
      margin-bottom: 6px;
    }
    .status-row:last-child { margin-bottom: 0; }
    .status-label { color: #888; }
    .status-value { color: #4ade80; font-weight: 500; }
    .status-value.error { color: #f87171; }
    .btn {
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      margin-bottom: 8px;
    }
    .btn-primary {
      background: #FF0000;
      color: white;
    }
    .btn-primary:hover { background: #cc0000; }
    .btn-primary:disabled { background: #666; cursor: not-allowed; }
    .btn-secondary {
      background: #16213e;
      color: #e0e0e0;
      border: 1px solid #333;
    }
    .btn-secondary:hover { background: #1a2744; }
    .toggle-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 12px;
      background: #16213e;
      border-radius: 10px;
      margin-bottom: 12px;
    }
    .toggle-label { font-size: 13px; }
    .toggle {
      width: 40px;
      height: 22px;
      background: #333;
      border-radius: 11px;
      position: relative;
      cursor: pointer;
      transition: background 0.2s;
    }
    .toggle.active { background: #4ade80; }
    .toggle::after {
      content: '';
      width: 18px;
      height: 18px;
      background: white;
      border-radius: 50%;
      position: absolute;
      top: 2px;
      left: 2px;
      transition: transform 0.2s;
    }
    .toggle.active::after { transform: translateX(18px); }
    .message {
      font-size: 12px;
      text-align: center;
      padding: 8px;
      border-radius: 6px;
      margin-top: 8px;
      display: none;
    }
    .message.show { display: block; }
    .message.success { background: rgba(74, 222, 128, 0.15); color: #4ade80; }
    .message.error { background: rgba(248, 113, 113, 0.15); color: #f87171; }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">
      <svg viewBox="0 0 24 24" fill="white"><path d="M10 8.5l5 3.5-5 3.5V8.5z"/></svg>
    </div>
    <div>
      <h1>YT Buzz Helper</h1>
      <div class="subtitle">Cookie Sync Extension</div>
    </div>
  </div>

  <div class="status-card">
    <div class="status-row">
      <span class="status-label">Last Sync:</span>
      <span id="lastSync" class="status-value">Never</span>
    </div>
    <div class="status-row">
      <span class="status-label">Cookies Found:</span>
      <span id="cookieCount" class="status-value">0</span>
    </div>
  </div>

  <div class="toggle-row">
    <span class="toggle-label">Auto-sync on YouTube visits</span>
    <div id="autoSyncToggle" class="toggle"></div>
  </div>

  <button id="syncBtn" class="btn btn-primary">Sync YouTube Cookies Now</button>

  <div id="message" class="message"></div>

  <script src="popup.js"></script>
</body>
</html>
